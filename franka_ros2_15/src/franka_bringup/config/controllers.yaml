/**:
  franka_robot_state_broadcaster:
    ros__parameters:
      lock_try_count: 10 # Number of attempts to acquire the lock in a single on_update()
      lock_sleep_interval: 35 # microseconds sleep between attempts
      lock_log_error: false # Log lock failures only when needed to reduce RT thread pressure
      lock_update_success: true # Keep update loop healthy even if one lock attempt fails

